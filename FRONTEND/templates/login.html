{% extends "base.html" %}

{% block title %}Login — SecureBank{% endblock %}

{% block content %}
<div class="sb-login-wrap">
  <div class="sb-login-card">

    <!-- Logo -->
    <div class="sb-login-logo"><i class="bi bi-bank2"></i> SecureBank</div>
    <p class="sb-login-sub">Sign in to manage your account</p>

    <!-- Card -->
    <div class="sb-card p-4">

      <form method="POST" action="{{ url_for('auth.login') }}" novalidate>

        <!-- Username -->
        <div class="mb-3">
          <label for="username" class="sb-form-label">
            <i class="bi bi-person me-1"></i>Username
          </label>
          <input
            type="text"
            id="username"
            name="username"
            class="form-control sb-form-control"
            placeholder="Enter your username"
            required
            autofocus
          />
        </div>

        <!-- Password -->
        <div class="mb-4">
          <label for="password" class="sb-form-label">
            <i class="bi bi-lock me-1"></i>Password
          </label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-control sb-form-control"
            placeholder="Enter your password"
            required
          />
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-sb-primary btn-lg">
            <i class="bi bi-arrow-right-circle me-2"></i>Sign In
          </button>
        </div>

      </form>

    </div>

    <!-- Demo hint -->
    <p class="text-center text-muted-sb mt-3" style="font-size:0.8rem;">
      <i class="bi bi-info-circle me-1"></i>
      Demo: <strong class="text-white-soft">alice</strong> / password123
      &nbsp;&middot;&nbsp;
      <strong class="text-white-soft">bob</strong> / secret456
    </p>

  </div>
</div>
{% endblock %}
