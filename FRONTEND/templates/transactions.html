{% extends "base.html" %}

{% block title %}Transactions — SecureBank{% endblock %}

{% block content %}

<!-- Back link -->
<a href="{{ url_for('dashboard.dashboard') }}" class="sb-back">
  <i class="bi bi-arrow-left"></i> Back to Dashboard
</a>

<p class="sb-welcome mb-1" style="font-size:1.55rem;">Manage Funds</p>
<p class="text-muted-sb mb-4" style="font-size:0.85rem;">Deposit or withdraw from your account below.</p>

<div class="row g-4">

  <!-- Deposit card -->
  <div class="col-12 col-md-6">
    <div class="sb-card sb-tx-card-deposit p-4 h-100">

      <div class="sb-tx-header">
        <div class="sb-tx-icon"><i class="bi bi-plus-circle-fill"></i></div>
        <div class="sb-tx-title">Deposit Funds</div>
        <div class="sb-tx-sub">Credit money into your account</div>
      </div>

      <form method="POST" action="{{ url_for('transactions.do_deposit') }}" novalidate>
        <div class="mb-3">
          <label for="deposit-amount" class="sb-form-label">
            <i class="bi bi-currency-dollar me-1"></i>Amount
          </label>
          <input
            type="number"
            id="deposit-amount"
            name="amount"
            class="form-control sb-form-control"
            placeholder="0.00"
            min="0.01"
            step="0.01"
            required
          />
        </div>
        <div class="d-grid mt-4">
          <button type="submit" class="btn btn-sb-success">
            <i class="bi bi-check-lg me-2"></i>Deposit
          </button>
        </div>
      </form>

    </div>
  </div>

  <!-- Withdraw card -->
  <div class="col-12 col-md-6">
    <div class="sb-card sb-tx-card-withdraw p-4 h-100">

      <div class="sb-tx-header">
        <div class="sb-tx-icon"><i class="bi bi-dash-circle-fill"></i></div>
        <div class="sb-tx-title">Withdraw Funds</div>
        <div class="sb-tx-sub">Debit money from your account</div>
      </div>

      <form method="POST" action="{{ url_for('transactions.do_withdraw') }}" novalidate>
        <div class="mb-3">
          <label for="withdraw-amount" class="sb-form-label">
            <i class="bi bi-currency-dollar me-1"></i>Amount
          </label>
          <input
            type="number"
            id="withdraw-amount"
            name="amount"
            class="form-control sb-form-control"
            placeholder="0.00"
            min="0.01"
            step="0.01"
            required
          />
        </div>
        <div class="d-grid mt-4">
          <button type="submit" class="btn btn-sb-danger">
            <i class="bi bi-arrow-up-right me-2"></i>Withdraw
          </button>
        </div>
      </form>

    </div>
  </div>

</div>
{% endblock %}
